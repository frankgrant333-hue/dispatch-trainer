{cat:"Performance",q:"The NET takeoff flight path used for the 35-ft obstacle check is the gross (demonstrated) path reduced by:",o:["0.8% gradient for 2-engine aircraft (0.9% for 3, 1.0% for 4)","10% of altitude","One wingspan"],a:0,exp:"<b>Net = gross minus a gradient penalty</b> (25.115) — a built-in safety margin, so the real airplane should outperform the path that clears obstacles by 35 ft.",ref:"25.115/121.189"},
{cat:"Performance",q:"121.189 requires the takeoff-weight calculation to account for:",o:["Airport elevation, temperature, wind (50%/150% rule), and runway slope/gradient","Passenger connections","Fuel price at destination"],a:0,exp:"The AFM data must be entered with <b>actual conditions</b>: pressure altitude, OAT, half-headwind/1.5×tailwind, and runway slope. Miss one and the whole chain is wrong.",ref:"121.189(e)"},
{cat:"FARs",q:"The engine failure assumed in 121.189 takeoff planning occurs:",o:["At the most critical point of takeoff (the V1/VEF case)","At 1,000 ft AGL","At level-off altitude"],a:0,exp:"All three checks — stop, go, obstacle path — assume the critical engine fails at the <b>worst possible moment</b>. That's what makes V1 the pivot of the whole calculation.",ref:"121.189/25.107"},
{cat:"FARs",q:"Where are the takeoff performance NUMBERS (V-speeds, climb gradients, accelerate-stop data) certified, versus where the air-carrier takeoff WEIGHT limits live?",o:["Certified under Part 25 (25.105–.121); operational limits applied by 121.189","Both in Part 91","Both in the AIM"],a:0,exp:"<b>Part 25 certifies the data; 121.189 tells the carrier how to apply it.</b> Exam trap: 'where is V2 defined?' → Part 25. 'What limits an air carrier's takeoff weight?' → 121.189.",ref:"Part 25/121.189"}
];
const CATS=[["all","🎯 Mixed — everything"],["AA FOM","🅰️ AA FOM — company policy"],["Performance","📈 Performance"],["Weights","⚖️ Weights"],["Nav & PBN","🛰 Nav, PBN & RVSM"],["Runways","🛬 Runways & Lighting"],["Approaches","📉 Approaches & Minimums"],["Maps & Codes","🗺 Maps, Centers & Codes"],["Weather","🌩 Weather"],["Systems","🔧 Aero & Systems"],["FARs","📜 FARs"],["Fractions","➗ Fractions"]];
// ---------------- ENGINE ----------------
const app=document.getElementById('app');
let state={};
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function home(){
  let hist='';
  try{const h=JSON.parse(localStorage.getItem('adxhist')||'[]');
    if(h.length)hist='<div class="hist">Recent: '+h.slice(-5).map(x=>`${x.m} ${x.s}/${x.n}`).join(' · ')+'</div>';
  }catch(e){}
  app.innerHTML=`<div class="card">
    <p style="margin-bottom:12px"><b>How it works:</b> pick an answer and the correct one is revealed immediately with a short discussion — then hit Next. 10 questions per round; 8/10 = passing.</p>
    <button class="level" style="background:#7a4a1f;border:1px solid #d98b3d" onclick="startFocus()">🔥 HYPER-FOCUS: Performance & Weights<small>10 straight questions on most people's weakness — and the examiner's favorite area</small></button>
    <p style="margin:10px 0 4px;color:var(--dim);font-size:.85rem">PROGRESSIVE LEVELS</p>
    <button class="level" onclick="start(1)">Level 1 — Fundamentals<small>Definitions, METAR/TAF basics, core FAR recall</small></button>
    <button class="level" onclick="start(2)">Level 2 — Applied<small>Alternate math, fuel calcs, weight limits, RVR conversions</small></button>
    <button class="level" onclick="start(3)">Level 3 — Full Dispatch Scenario<small>Real paperwork package with buried problems — test-level</small></button>
    <p style="margin:14px 0 4px;color:var(--dim);font-size:.85rem">AA REAL-EXAM DRILLS — built from actual hiring-test reports</p>
    ${CATS.map(c=>`<button class="level" onclick="startCat('${c[0]}')">${c[1]}<small>${c[0]==='all'?'10 random questions from the whole AA bank':countCat(c[0])+' questions in this topic'}</small></button>`).join('')}
    ${hist}</div>`;
}
function countCat(c){return AABANK.filter(q=>q.cat===c).length;}
function start(lv){
  let pool=BANK.filter(q=>q.lv===lv),scen=null,qs;
  if(lv===3){const key=shuffle(Object.keys(SCEN))[0];qs=shuffle(pool.filter(q=>q.sc===key)).slice(0,10);scen=key;}
  else qs=shuffle(pool).slice(0,10);
  state={mode:'L'+lv,lv,scen,qs,i:0,score:0,picked:null,done:[]};
  render();
}
function startCat(cat){
  const pool=cat==='all'?AABANK:AABANK.filter(q=>q.cat===cat);
  const qs=shuffle(pool).slice(0,Math.min(10,pool.length));
  state={mode:cat==='all'?'AA-Mix':'AA-'+cat,lv:null,scen:null,qs,i:0,score:0,picked:null,done:[]};
  render();
}
function startFocus(){
  const pool=AABANK.filter(q=>q.cat==='Performance'||q.cat==='Weights');
  const qs=shuffle(pool).slice(0,10);
  state={mode:'🔥Perf',lv:null,scen:null,qs,i:0,score:0,picked:null,done:[]};
  render();
}
function render(){
  const q=state.qs[state.i],p=state.picked,answered=p!==null;
  const scen=state.scen?`<pre class="paper">${SCEN[state.scen]}</pre>`:'';
  app.innerHTML=`<div class="card">
    <div class="bar"><div style="width:${(state.i+(answered?1:0))/state.qs.length*100}%"></div></div>
    ${state.scen?scen:''}
    <div class="topic">${q.topic||q.cat}${answered?' · '+q.ref:''}</div>
    <div class="qnum">Question ${state.i+1} of ${state.qs.length} — score so far: ${state.score}</div>
    <div class="qtext">${q.q}</div>
    ${q.o.map((o,j)=>{
      let cls='';
      if(answered){if(j===q.a)cls='correct';else if(j===p)cls='wrong';}
      return `<button class="opt ${cls}" ${answered?'style="cursor:default"':''} onclick="pick(${j})">${'ABC'[j]}. ${o}${answered&&j===q.a?' ✔':''}${answered&&j===p&&p!==q.a?' ✘ your answer':''}</button>`;}).join('')}
    ${answered?`<div class="exp"><b>${p===q.a?'✅ Correct.':'❌ Not quite — the answer is '+'ABC'[q.a]+'.'}</b> ${q.exp}</div>
      <div style="margin-top:12px"><button onclick="next()" style="background:#5cb85c">${state.i<state.qs.length-1?'Next Question ▶':'See Final Score ✔'}</button>
      <button onclick="home()" style="background:#33415c">Quit</button></div>`
    :`<div style="margin-top:12px"><button onclick="home()" style="background:#33415c">Quit</button></div>`}
  </div>`;
  window.scrollTo(0,0);
}
function pick(j){
  if(state.picked!==null)return;
  state.picked=j;
  const q=state.qs[state.i];
  if(j===q.a)state.score++;
  state.done.push({q,picked:j});
  render();
}
function next(){
  state.picked=null;state.i++;
  if(state.i>=state.qs.length)finish();else render();
}
function finish(){
  const n=state.qs.length,score=state.score,pass=score>=Math.ceil(n*0.8);
  try{const h=JSON.parse(localStorage.getItem('adxhist')||'[]');h.push({m:state.mode,s:score,n,d:Date.now()});localStorage.setItem('adxhist',JSON.stringify(h));}catch(e){}
  const missed=state.done.filter(d=>d.picked!==d.q.a);
  const rows=missed.map((d,i)=>`<div class="card"><div class="topic">${d.q.topic||d.q.cat} · ${d.q.ref}</div>
      <div class="qtext">${d.q.q}</div>
      ${d.q.o.map((o,j)=>`<div class="opt ${j===d.q.a?'correct':(d.picked===j?'wrong':'')}" style="cursor:default">${'ABC'[j]}. ${o}${j===d.q.a?' ✔':''}${d.picked===j&&d.picked!==d.q.a?' ✘':''}</div>`).join('')}
      <div class="exp">${d.q.exp}</div></div>`).join('');
  const perfMissed=missed.some(d=>['Performance','Weights'].includes(d.q.cat)||['Performance','Weights','W&B'].includes(d.q.topic));
  const focusPrompt=state.mode==='🔥Perf'
    ?`<button onclick="startFocus()" style="background:#7a4a1f">🔥 Another 10 Performance questions</button>`
    :`<div style="margin-top:14px;padding:12px;background:#11203a;border-radius:8px">
       <b>${perfMissed?'You missed performance material this round.':'Want to sharpen the examiner\\u2019s favorite area?'}</b><br>
       <span style="color:var(--dim);font-size:.9rem">Performance & weights is most people's weak spot — and what test examiners focus on most.</span><br>
       <button onclick="startFocus()" style="background:#7a4a1f;margin-top:8px">🔥 Hyper-Focus: 10 straight Performance questions</button></div>`;
  app.innerHTML=`<div class="card" style="text-align:center">
    <div class="score ${pass?'pass':'fail'}">${score} / ${n}</div>
    <p>${pass?'✅ Passing — nice work.':'📚 Below '+Math.ceil(n*0.8)+'/'+n+' — review your misses below, then retry.'}</p>
    <button onclick="${state.lv?`start(${state.lv})`:'home()'}">Retry</button>
    ${pass&&state.lv&&state.lv<3?`<button onclick="start(${state.lv+1})">Level ${state.lv+1} ▶</button>`:''}
    <button onclick="home()" style="background:#33415c">Menu</button>
    ${focusPrompt}</div>
    ${missed.length?`<h1 style="font-size:1.1rem;margin:10px 0">Review your ${missed.length} miss${missed.length>1?'es':''}</h1>${rows}`:'<div class="card">Perfect round — nothing to review. 🎉</div>'}`;
  window.scrollTo(0,0);
}
window.start=start;window.startCat=startCat;window.startFocus=startFocus;window.pick=pick;window.next=next;window.home=home;
home();
</script>
</body>
</html>
