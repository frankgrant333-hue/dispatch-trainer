  .qnum{color:var(--dim);font-size:.8rem;margin-bottom:4px;}

  .opt.sel{border-color:var(--accent);background:#34507a;}
  .opt.correct{border-color:var(--good);background:#1e3d27;}
  .opt.wrong{border-color:var(--bad);background:#41201f;}

  .exp b{color:var(--ink);}
  .bar{height:8px;background:#33415c;border-radius:4px;margin:10px 0 18px;}
  .bar div{height:100%;background:var(--accent);border-radius:4px;transition:width .3s;}
  .score{font-size:2.2rem;font-weight:bold;}
  .pass{color:var(--good);} .fail{color:var(--bad);}
  .topic{display:inline-block;background:#33415c;color:var(--dim);border-radius:12px;padding:2px 10px;font-size:.72rem;margin-bottom:8px;}
  .hist{font-size:.85rem;color:var(--dim);margin-top:8px;}

{cat:"Weights",q:"ZFW = ________ + ________",o:["OEW + payload","OEW + usable fuel","Payload + fuel"],a:0,exp:"<b>ZFW = OEW + payload.</b> Everything except usable fuel. Add fuel and you get ramp/takeoff weight.",ref:"Ref 06 §1"},
{cat:"Weights",q:"EOW plus maximum payload equals:",o:["MTOW","MZFW","Maximum landing weight"],a:1,exp:"Same identity in reverse: <b>EOW + max payload = MZFW</b>. The AA test asks it both directions.",ref:"Ref 06 §1"},
{cat:"Weights",q:"ZFW is best defined as:",o:["Total aircraft weight minus all usable fuel","Empty aircraft with crew only","Takeoff weight minus taxi fuel"],a:0,exp:"ZFW = the whole loaded airplane — minus <b>usable fuel</b>. That's the definition the test quoted verbatim.",ref:"Ref 06 §1"},
{cat:"Weights",q:"MZFW exists as a structural limit primarily to protect:",o:["The landing gear","The wing root from bending loads","The aft pressure bulkhead"],a:1,exp:"Fuel in the wings relieves wing bending. With zero fuel, all lift-vs-fuselage-weight bending concentrates at the <b>wing root</b> — MZFW caps that load.",ref:"Ref 06 §1"},
{cat:"Weights",q:"May a flight be dispatched above max structural takeoff weight if the runway is long enough?",o:["Yes, with captain concurrence","Yes, if landing weight will be legal","No — never"],a:2,exp:"<b>Never.</b> No performance data exists above max structural — the test stressed you cannot take off over max structural weight.",ref:"121.189"},
{cat:"Weights",q:"Burn to destination 9,000 lb. MLW 144,000, structural MTOW 174,200. Max takeoff weight tonight:",o:["174,200","153,000 (MLW + burn)","144,000"],a:1,exp:"Landing-weight-limited: MLW 144,000 + burn 9,000 = <b>153,000</b> — lower than structural MTOW, so it controls.",ref:"121.195"},
// Nav & PBN
{cat:"Nav & PBN",q:"PBN stands for:",o:["Precision-Based Navigation","Performance-Based Navigation","Position Broadcast Network"],a:1,exp:"<b>Performance-Based Navigation</b> — navigation defined by performance requirements, not specific ground stations. Its two branches: RNAV and RNP.",ref:"Ref 06 §2"},
{cat:"Nav & PBN",q:"The key difference between RNP and RNAV is that RNP adds:",o:["Satellite navigation","Onboard performance monitoring and alerting","Ground radar surveillance"],a:1,exp:"<b>RNP = RNAV + onboard monitoring & alerting.</b> The airplane warns the crew when nav accuracy can't be assured. This exact difference is asked on the AA test.",ref:"Ref 06 §2"},
{cat:"Nav & PBN",q:"RNP AR approaches require:",o:["Only a current GPS database","Special FAA authorization, equipment, and crew training","CAT III autoland"],a:1,exp:"<b>AR = Authorization Required</b> — tighter tolerances (to 0.1 NM), curved legs, special approval. Used at terrain-challenged airports.",ref:"Ref 06 §2"},
{cat:"Nav & PBN",q:"ADS-B 'Out' means the aircraft:",o:["Broadcasts its GPS-derived position automatically ~once per second","Receives traffic and weather","Is outside radar coverage"],a:0,exp:"<b>Automatic Dependent Surveillance–Broadcast:</b> Out = transmit position (mandated in most US controlled airspace); In = receive traffic/weather.",ref:"Ref 06 §2"},
{cat:"Nav & PBN",q:"A TCAS RA (Resolution Advisory):",o:["Is advisory only — follow ATC instead","Commands a vertical maneuver the crew must follow, even against ATC","Commands a turn away from traffic"],a:1,exp:"An <b>RA overrides ATC</b> — crews must follow it. TCAS coordinates through both transponders; maneuvers are vertical only.",ref:"Ref 06 §10"},
{cat:"Nav & PBN",q:"Two aircraft converge head-on at FL350. TCAS coordinates so that:",o:["Both climb","One gets CLIMB and the other DESCEND","Both turn right"],a:1,exp:"The two TCAS units talk to each other and issue <b>complementary</b> RAs — one climbs, one descends.",ref:"Ref 06 §10"},
{cat:"Nav & PBN",q:"RVSM airspace runs from:",o:["FL180–FL600","FL290–FL410","FL240–FL350"],a:1,exp:"<b>FL290–FL410 inclusive</b>, with 1,000-ft separation between RVSM-approved aircraft.",ref:"Ref 06 §10"},
{cat:"Nav & PBN",q:"Within RVSM, vertical separation between approved aircraft is:",o:["500 ft","1,000 ft","2,000 ft"],a:1,exp:"That's the point of RVSM: <b>1,000 ft</b> instead of the old 2,000 ft above FL290 — doubling usable flight levels.",ref:"Ref 06 §10"},
{cat:"Nav & PBN",q:"Magnetic variation is:",o:["Compass error from onboard electronics","The angle between true north and magnetic north at a location","Annual drift of the magnetic pole"],a:1,exp:"Variation = <b>angle between true and magnetic north</b>. 'East is least (subtract), West is best (add)' going true→magnetic.",ref:"Ref 06 §6"},
{cat:"Nav & PBN",q:"A SID is:",o:["A published IFR departure procedure","An arrival procedure","A surface movement chart"],a:0,exp:"<b>Standard Instrument Departure</b> — obstacle-safe published routing from runway to the en route structure. STAR is the arrival twin.",ref:"Ref 06 §6"},
{cat:"Nav & PBN",q:"A STAR is:",o:["A departure procedure","A published arrival route from en route to the approach phase","An oceanic track"],a:1,exp:"<b>Standard Terminal Arrival Route</b> — transitions you from the en route structure to the approach environment.",ref:"Ref 06 §6"},
{cat:"Nav & PBN",q:"Long-range NAVIGATION systems include:",o:["VOR/DME and ILS","GPS/GNSS and IRS/INS","ADF and marker beacons"],a:1,exp:"Oceanic/remote ops use <b>GPS/GNSS and inertial (IRS/INS)</b> — self-contained or satellite-based, no ground stations needed.",ref:"Ref 06 §6"},
{cat:"Nav & PBN",q:"Long-range COMMUNICATIONS include:",o:["VHF only","HF, SATCOM, CPDLC","ACARS over VHF only"],a:1,exp:"VHF is line-of-sight (~200 NM). Beyond that: <b>HF radio, satellite voice, and CPDLC datalink</b>.",ref:"Ref 06 §6"},
{cat:"Nav & PBN",q:"Satellite navigation constellations — USA / Europe / Russia:",o:["GPS / Galileo / GLONASS","GLONASS / GPS / Galileo","Galileo / GLONASS / GPS"],a:0,exp:"<b>USA=GPS, Europe=Galileo, Russia=GLONASS</b> (China=BeiDou). This exact match-up was on Test 2.",ref:"Ref 06 §6"},
{cat:"Nav & PBN",q:"Extended overwater operations begin more than:",o:["50 NM from the nearest shoreline","100 NM offshore","200 NM from land"],a:0,exp:"<b>50 NM horizontally from the nearest shoreline</b> (14 CFR 1.1) — triggers raft/equipment and comm requirements.",ref:"14 CFR 1.1"},
// Runways & Lighting
{cat:"Runways",q:"RCAM stands for:",o:["Runway Condition Assessment Matrix","Runway Contamination and Measurement","Runway Closure Advisory Message"],a:0,exp:"<b>Runway Condition Assessment Matrix</b> — matches contaminant type/depth to a condition code and braking action.",ref:"Ref 06 §3"},
{cat:"Runways",q:"RwyCC codes run:",o:["1–10, 10 best","0–6, 6 = dry","A–F, A best"],a:1,exp:"<b>6 (dry) down to 0 (nil)</b>, reported per runway third in FICON NOTAMs, e.g. 5/5/3.",ref:"Ref 06 §3"},
{cat:"Runways",q:"A FICON reports RwyCC 5/5/0. You may:",o:["Dispatch normally","Add 15% landing distance","Not use that runway — nil braking in one third"],a:2,exp:"<b>Code 0 = nil braking = unusable.</b> Any third at 0 kills the runway for dispatch.",ref:"Ref 06 §3"},
{cat:"Runways",q:"REIL is:",o:["A pair of synchronized flashing white lights identifying the threshold","In-pavement centerline lighting","The rotating airport beacon"],a:0,exp:"<b>Runway End Identifier Lights</b> — two synchronized flashers, one each side of the approach end, to pick the threshold out of city lights.",ref:"Ref 06 §4"},
{cat:"Runways",q:"TDZL is:",o:["White light bars flush in the touchdown-zone pavement (threshold to 3,000 ft/midpoint)","Red terminating bars","Amber caution-zone edge lights"],a:0,exp:"<b>Touchdown Zone Lights</b> — required for some CAT II/III minimums. TDZL + REIL was a 'define both' question on the real test.",ref:"Ref 06 §4"},
{cat:"Runways",q:"With a displaced threshold, the pavement BEFORE the arrows may be used for:",o:["Nothing","Takeoff roll and landing rollout, but not touchdown","Landing touchdown only"],a:1,exp:"You may <b>start takeoff and roll out</b> on it, but touchdown must be at/past the displaced threshold (obstacle or noise reasons).",ref:"Ref 06 §4"},
{cat:"Runways",q:"A stopway may be credited toward:",o:["Accelerate-go distance","Accelerate-stop distance","Landing distance"],a:1,exp:"<b>Stopway = STOP case only</b> (aborted takeoff overrun). Clearway = GO case. They're a classic pair question.",ref:"14 CFR 1.1"},
{cat:"Runways",q:"A clearway may be credited toward:",o:["Accelerate-go (airborne segment to 35 ft)","Accelerate-stop","Landing distance"],a:0,exp:"<b>Clearway</b> = obstacle-free area (min 500 ft wide) past the runway end used for the climb to screen height in the GO case.",ref:"14 CFR 1.1"},
{cat:"Runways",q:"Runway 27 points:",o:["North","West","East"],a:1,exp:"Number × 10 = magnetic heading: 27 → <b>270° = west</b>. 36=N, 18=S, 09=E — you'll draw these on the test.",ref:"Ref 06 §4"},
{cat:"Runways",q:"Drawing an airport diagram: runway 36's painted number goes:",o:["At the north end","At the south end (you land on 36 heading north)","At either end"],a:1,exp:"Numbers sit at the end you'd cross first landing on that heading — 36 (fly north) is painted at the <b>south end</b>.",ref:"Ref 06 §4"},
{cat:"Runways",q:"The graded area around the runway to reduce damage in an overrun/excursion is the:",o:["Blast pad","RSA (Runway Safety Area)","Clearway"],a:1,exp:"<b>RSA</b> — typically 500 ft wide, extending 1,000 ft past each end for air-carrier runways.",ref:"Ref 06 §4"},
// Approaches
{cat:"Approaches",q:"A precision approach provides:",o:["Lateral guidance only","Electronic lateral AND vertical guidance","Radar vectors to the runway"],a:1,exp:"Precision = <b>glideslope included</b>: ILS, PAR, GLS. Lateral-only = non-precision.",ref:"Ref 06 §5"},
{cat:"Approaches",q:"Which list is all NON-precision?",o:["ILS, PAR, GLS","LOC, VOR, NDB, LNAV","ILS, LPV, LNAV/VNAV"],a:1,exp:"<b>LOC, VOR, NDB, LDA, SDF, LNAV</b> = lateral only. The test asks you to sort a list exactly like this.",ref:"Ref 06 §5"},
{cat:"Approaches",q:"A non-precision approach uses which minimum altitude?",o:["DA","DH","MDA"],a:2,exp:"<b>MDA</b> — a hard floor you level at and may not leave without visual reference. Precision uses DA/DH.",ref:"Ref 06 §5"},
{cat:"Approaches",q:"The practical difference between MDA and DA:",o:["None","MDA is a floor you hold; DA is a decision point where a momentary dip during go-around is accepted","DA applies only to circling"],a:1,exp:"At <b>DA</b> you decide while descending (a small dip below during go-around is expected). At <b>MDA</b> you must not descend below it at all without the runway environment.",ref:"Ref 06 §5"},
{cat:"Approaches",q:"Standard CAT I ILS minimums are about:",o:["DH 200 ft / RVR 2400 (1800 with TDZ+CL lights)","DH 100 / RVR 1200","DH 50 / RVR 700"],a:0,exp:"<b>CAT I: 200 & 2400/1800.</b> Know the ladder: CAT II 100/1200, CAT IIIa <100/700, IIIb to RVR 150.",ref:"Ref 06 §5"},
{cat:"Approaches",q:"CAT II minimums are:",o:["DH 200 / RVR 2400","DH 100–199 / RVR ≥1200","No DH / RVR 300"],a:1,exp:"<b>CAT II: DH 100 to <200 ft, RVR ≥1200.</b> Requires OpSpec authorization, aircraft equipment, crew training.",ref:"Ref 06 §5"},
{cat:"Approaches",q:"Two things that allow AA to use lower-than-standard minimums:",o:["Captain seniority and a dry runway","OpSpecs authorization AND qualifying equipment/trained crews","TCAS and ADS-B"],a:1,exp:"<b>(1) OpSpecs authorization</b> (C059 CAT II, C060 CAT III, C055 alternates) and <b>(2) qualified equipment + trained crews</b> (autoland/HUD). Straight off the real test.",ref:"Ref 06 §5"},
{cat:"Approaches",q:"OpSpec C055, ONE usable approach (ILS 200-1/2). Derived alternate minimums:",o:["600 – 1 1/2","400 – 1","200 – 1/2"],a:0,exp:"One approach: <b>add 400 ft / add 1 SM</b> → 600-1½. Two approaches to different runways: add 200/½ to the higher → 400-1.",ref:"OpSpec C055"},
// Maps & Codes
{cat:"Maps & Codes",q:"\"If you READ it, it's ______; if you HEAR it, it's ______.\"",o:["Magnetic / true","True / magnetic","True / true"],a:1,exp:"<b>Read = TRUE</b> (METAR, TAF, winds aloft, charts). <b>Hear = MAGNETIC</b> (ATIS, AWOS, tower). AIM 7-1-11.",ref:"Ref 06 §6"},
{cat:"Maps & Codes",q:"METAR winds are referenced to ______; ATIS winds to ______:",o:["Magnetic / true","True / magnetic","Both magnetic"],a:1,exp:"Printed products are <b>true</b>; broadcast winds are <b>magnetic</b> (so they compare directly to runway numbers).",ref:"AIM 7-1-11"},
{cat:"Maps & Codes",q:"The exception to 'hear it = magnetic':",o:["Tower wind checks","An FSS briefer reading charted/textual winds (true)","ATIS at Class B airports"],a:1,exp:"The briefer is just <b>reading the printed (true) data aloud</b> — the one 'heard' source that stays true.",ref:"AIM 7-1-11"},
{cat:"Maps & Codes",q:"Which ARTCC works traffic over Dallas–Fort Worth?",o:["ZHU","ZFW","ZAB"],a:1,exp:"<b>ZFW = Fort Worth Center.</b> Know all 20 CONUS centers for the map-labeling exercise (Ref 06 §7 has the table + memory trick).",ref:"Ref 06 §7"},
{cat:"Maps & Codes",q:"ZTL / ZLA / ZNY / ZAU are:",o:["Atlanta / Los Angeles / New York / Chicago","Tulsa / Las Vegas / Newark / Austin","Atlanta / Louisiana / New York / Augusta"],a:0,exp:"<b>Atlanta, Los Angeles, New York, Chicago.</b> The Z-codes rarely match city initials — memorize the map.",ref:"Ref 06 §7"},
{cat:"Maps & Codes",q:"AA hub codes CLT / PHX / DCA:",o:["Charlotte / Phoenix / Washington National","Charleston / Philadelphia / Dallas","Charlotte / Portland / Denver"],a:0,exp:"<b>Charlotte, Phoenix, Washington National.</b> Drill all AA hubs: DFW CLT ORD PHX PHL MIA DCA LAX JFK LGA.",ref:"Ref 06 §8"},
{cat:"Maps & Codes",q:"MAD / FCO / LHR are:",o:["Madrid, Rome-Fiumicino, London Heathrow","Milan, Florence, Gatwick","Madrid, Frankfurt, Lisbon"],a:0,exp:"Europe cities are on the test (with a map). <b>MAD=Madrid, FCO=Rome, LHR=Heathrow</b>; also know CDG, BCN, FRA, DUB, AMS.",ref:"Ref 06 §8"},
{cat:"Maps & Codes",q:"GRU / EZE / SCL are:",o:["São Paulo, Buenos Aires, Santiago","Rio, Lima, Caracas","Bogotá, Quito, Montevideo"],a:0,exp:"South America map is on the test. <b>GRU=São Paulo, EZE=Buenos Aires, SCL=Santiago</b>; also GIG, LIM, BOG.",ref:"Ref 06 §8"},
// Weather
{cat:"Weather",q:"FROPA in a METAR remark means:",o:["Frozen precipitation approaching","Frontal passage at the station","Fog rolling off open water"],a:1,exp:"<b>FROntal PAssage</b> — expect a wind shift, temperature change, pressure trough, and often a <b>runway change</b>.",ref:"Ref 06 §9"},
{cat:"Weather",q:"Dispatch-relevant effects of a frontal passage include:",o:["Wind shift, temperature change, likely runway changes","Improved visibility only","Altimeter freezing"],a:0,exp:"The wind shift flips the active runway — that's the dispatcher's angle on FROPA, exactly as the exam notes said.",ref:"Ref 06 §9"},
{cat:"Weather",q:"Volcanic ash is dangerous mainly because it:",o:["Shows up too brightly on radar","Melts in the engine hot section and can flame out engines — and radar canNOT detect it","Only reduces visibility"],a:1,exp:"Silica melts at turbine temps, re-solidifies on blades → <b>flameout</b>; it also sandblasts windscreens and clogs pitot tubes. Invisible to radar — avoid via SIGMET/VAAC routing.",ref:"Ref 06 §9"},
{cat:"Weather",q:"Mountain wave turbulence requires:",o:["Unstable air and light wind","Stable air and wind ≥ ~25 kt roughly perpendicular to the ridge","A sea breeze"],a:1,exp:"<b>Stable air + strong cross-ridge wind</b> = standing waves; look for lenticular/rotor clouds; worst in the rotor.",ref:"Ref 06 §9"},
{cat:"Weather",q:"Katabatic wind is:",o:["Gravity-driven downslope flow of cold, dense air","An upslope daytime valley breeze","Jet-stream core wind"],a:0,exp:"<b>Downslope drainage wind</b> (bora = cold type, Santa Ana/foehn = warm type). It was on a recent AA test.",ref:"Ref 06 §9"},
{cat:"Weather",q:"The ITCZ is:",o:["A mid-latitude jet","The equatorial belt where trade winds converge, producing persistent thunderstorms","A polar front"],a:1,exp:"<b>Intertropical Convergence Zone</b> — NE and SE trades meet near the equator → constant deep convection. Matters on South America routes.",ref:"Ref 06 §9"},
{cat:"Weather",q:"An airmass thunderstorm is:",o:["Organized along a squall line","An isolated, short-lived single cell from daytime heating","Always embedded in stratus"],a:1,exp:"<b>Single-cell, heat-driven, brief</b> — not frontal or organized. Stages: cumulus → mature → dissipating.",ref:"AC 00-6B"},
{cat:"Weather",q:"A CB piercing a stratus deck is dangerous because:",o:["The storm is invisible from outside the deck — an embedded thunderstorm","Stratus adds icing only","Stratus dissipates CBs"],a:0,exp:"<b>Embedded TS</b> — can't be seen and avoided visually; needs radar. Generates 'embedded' convective SIGMETs.",ref:"Ref 06 §9"},
{cat:"Weather",q:"Which METAR group is an OBSCURATION rather than precipitation?",o:["-RA","BR","PL"],a:1,exp:"<b>BR (mist) is an obscuration</b> — suspended, vis-reducing. RA/SN/PL/GR fall = precipitation. The test asks precip vs obscured.",ref:"Ref 06 §9"},
{cat:"Weather",q:"PLSNRA in a METAR decodes as:",o:["Ice pellets, snow, rain (mixed, in order of predominance)","Hail, sleet, freezing rain","Drizzle, snow grains, showers"],a:0,exp:"<b>PL + SN + RA</b> — mixed precip listed by predominance; any intensity symbol applies to the FIRST type only. Straight off the 6/24/22 test.",ref:"Ref 06 §9"},
{cat:"Weather",q:"For the intensity of precipitation falling RIGHT NOW, read the:",o:["TAF","METAR","Area forecast"],a:1,exp:"<b>METAR = observation</b> (what IS happening); TAF = forecast (what's expected). Test 2 asked exactly this.",ref:"Ref 06 §9"},
{cat:"Weather",q:"A ceiling is the lowest:",o:["FEW or SCT layer","BKN or OVC layer (or vertical visibility)","Cloud of any amount"],a:1,exp:"<b>BKN/OVC/VV only</b> — FEW and SCT never make a ceiling. Reported AGL.",ref:"AC 00-45H"},
{cat:"Weather",q:"TAF: FM221800 17010KT P6SM VCTS BKN040CB — VCTS means:",o:["Thunderstorm at the field","Thunderstorm in the vicinity (5–10 SM)","Virga with cumulus tops"],a:1,exp:"<b>VC = vicinity</b>, 5–10 SM from the station. The test makes you find WHEN the VCTS period starts in a TAF.",ref:"AC 00-45H"},
{cat:"Weather",q:"TAF: FM221500 18015G25KT 4SM -TSRA BKN015CB, FM222100 21008KT P6SM SCT050. Rain begins at:",o:["0600Z","1500Z","2100Z"],a:1,exp:"The <b>FM1500 group introduces -TSRA</b> → rain starts 1500Z and ends when the 2100Z group drops it. TAF timeline reading is the #1 reported skill on this test.",ref:"Ref 06 §9"},
{cat:"Weather",q:"In that TAF, ceilings are below 2,000 ft:",o:["Never","1500Z–2100Z (BKN015)","After 2100Z"],a:1,exp:"BKN015 = 1,500 AGL ceiling from 1500Z until the FM2100 group raises it (SCT050 = no ceiling).",ref:"Ref 06 §9"},
// Aero & Systems
{cat:"Systems",q:"Per Bernoulli, faster air over the wing's curved upper surface produces:",o:["Higher pressure above the wing","Lower pressure above the wing — net upward force","No pressure change"],a:1,exp:"Faster flow = <b>lower static pressure</b> above → pressure differential lifts. Plus Newton: air deflected down pushes the wing up.",ref:"Ref 06 §10"},
{cat:"Systems",q:"The primary flight controls are:",o:["Flaps, slats, spoilers","Ailerons (roll), elevator (pitch), rudder (yaw)","Trim tabs and speed brakes"],a:1,exp:"<b>Aileron/elevator/rudder</b> = primary. Flaps/slats/spoilers/trim = secondary. Asked verbatim on the AA test.",ref:"Ref 06 §10"},
{cat:"Systems",q:"Electrical power on the ground / in the air comes from:",o:["APU or ground power / engine-driven generators","Batteries / APU only","RAT / batteries"],a:0,exp:"Ground: <b>APU generator or GPU</b>. Air: <b>engine-driven generators (IDGs)</b>, APU backup, RAT for emergencies. A favorite systems question.",ref:"Ref 06 §10"},
{cat:"Systems",q:"A tailwind on takeoff:",o:["Shortens the takeoff roll","Lengthens the roll and reduces obstacle-clearance margin","No effect under 20 kt"],a:1,exp:"Same airspeed needs a <b>higher groundspeed</b> → longer roll, worse gradient. Most jets are limited to 10–15 kt tailwind.",ref:"Ref 06 §10"},
{cat:"Systems",q:"An engine failure is recognized AFTER passing V1. The crew must:",o:["Reject the takeoff immediately","Continue the takeoff — you are committed to fly","Ask the dispatcher"],a:1,exp:"Past V1 there is no longer guaranteed stopping distance — <b>continue, rotate at VR, climb at V2</b>. Rejects above V1 cause overruns.",ref:"25.107"},
{cat:"Systems",q:"After an engine failure on takeoff, the speed flown through the second segment climb is:",o:["V2","VREF","V1"],a:0,exp:"<b>V2 — the takeoff safety speed</b> — guarantees the required engine-out gradient from 35 ft to level-off. VREF (≈1.3 VS0) is the landing speed.",ref:"25.107"},
{cat:"Systems",q:"CG position is expressed as a percentage of:",o:["Wingspan","MAC (mean aerodynamic chord)","Fuselage length"],a:1,exp:"<b>% MAC</b> — e.g., 25% MAC. The SW test hit MAC/CG directly.",ref:"Ref 06 §10"},
{cat:"Systems",q:"An aft CG (within limits) gives:",o:["More stability, higher stall speed","Less stability, lower stall speed, better cruise efficiency","No handling change"],a:1,exp:"Aft CG = less tail-download → <b>less stable but more efficient</b>, lower stall speed. Forward CG is the safe-but-thirsty direction.",ref:"PHAK Ch.10"},
{cat:"Systems",q:"When an engine fails at cruise, the captain FIRST:",o:["Calls dispatch","Maintains aircraft control and flies the engine-out procedure/driftdown","Shuts off the other engine's bleed"],a:1,exp:"<b>Aviate first</b> — control, driftdown/EO procedure, declare — then coordinate with dispatch on where to land.",ref:"Ref 06 §10"},
{cat:"Systems",q:"After an engine failure, the landing airport decision is made:",o:["By ATC","Jointly by captain and dispatcher — nearest suitable airport in point of time unless continuing is as safe (121.565)","By maintenance control"],a:1,exp:"<b>121.565 + 121.533 joint responsibility.</b> Twins: land at nearest suitable in time. The interview loves this scenario.",ref:"121.565"},
// FARs
{cat:"FARs",q:"121.99: the communication link must provide '________ communications' between each airplane and dispatch:",o:["Continuous and recorded","Reliable and rapid","Encrypted and redundant"],a:1,exp:"<b>'Reliable and rapid'</b> — the exact phrase the test blanks out. Required over the ENTIRE route.",ref:"121.99"},
{cat:"FARs",q:"121.99(b): except in an emergency, the airplane↔dispatch comm system must be:",o:["Operated by the FAA","Independent of any system operated by the United States","VHF only"],a:1,exp:"The carrier's dispatch comms must be <b>independent of US-government systems</b> (ATC frequencies don't count as your dispatch link).",ref:"121.99"},
{cat:"FARs",q:"121.599(a): no dispatcher may release a flight unless thoroughly familiar with:",o:["Forecast weather only","Reported AND forecast weather on the route to be flown","Destination weather only"],a:1,exp:"<b>'Reported and forecast weather conditions on the route to be flown'</b> — memorize the phrase; it's a fill-in-the-blank.",ref:"121.599"},
{cat:"FARs",q:"In supplemental operations, the 121.599 weather-familiarity duty falls on:",o:["The aircraft dispatcher","The pilot in command","The director of operations"],a:1,exp:"Supplemental ops have no dispatcher requirement — the duty shifts to the <b>PIC</b> (121.599(b)).",ref:"121.599"},
{cat:"FARs",q:"121.629(a): the opinion that icing might adversely affect safety may come from:",o:["The PIC only","The PIC or the aircraft dispatcher","ATC"],a:1,exp:"<b>'PIC or aircraft dispatcher'</b> (domestic/flag) — no dispatch, release, continued operation, or landing when either believes icing threatens safety.",ref:"121.629"},
{cat:"FARs",q:"121.629(b): no takeoff when frost, ice, or snow is ________ to wings, control surfaces, propellers, engine inlets:",o:["Adjacent","Adhering","Forecast to adhere"],a:1,exp:"<b>'Adhering'</b> — the clean-aircraft concept. The one exception: frost under the wing in the fuel-tank area, if authorized.",ref:"121.629"},
{cat:"FARs",q:"Dispatching when frost/ice/snow may reasonably be expected to adhere requires:",o:["Captain's discretion","An approved ground deicing/anti-icing program in the OpSpecs, complied with","A heated hangar departure"],a:1,exp:"121.629(c): <b>approved ground deicing/anti-icing program</b> (holdover times, checks) — or the (d) alternative: contamination check within 5 minutes of takeoff.",ref:"121.629"},
{cat:"FARs",q:"121.663: the PIC and dispatcher sign the release only if:",o:["The weather is VFR","They BOTH believe the flight can be made with safety","Either one believes it is safe"],a:1,exp:"<b>Both must believe it's safe</b> — that's the two-signature system at the heart of Part 121 dispatch.",ref:"121.663"},
{cat:"FARs",q:"121.663: the dispatcher may delegate authority to ______ a release, but NOT authority to ______:",o:["Sign / dispatch","Dispatch / sign","Amend / cancel"],a:0,exp:"<b>Delegate SIGNING, never DISPATCHING.</b> Frank's highlighted line — the test blanks exactly these two words.",ref:"121.663"},
{cat:"FARs",q:"121.639 domestic fuel = fuel to destination, plus:",o:["Most distant alternate + 45 min at normal cruise consumption","Nearest alternate + 30 min holding","10% of trip time + 45 min"],a:0,exp:"<b>Destination + MOST DISTANT alternate + 45 minutes.</b> The 10%/30-min-holding formula is FLAG (121.645) — a classic trap.",ref:"121.639"},
{cat:"FARs",q:"Flag (international) turbine fuel differs from domestic by adding:",o:["10% of destination-bound time and 30 min holding at 1,500 ft over the alternate","2 hours reserve","Nothing — identical"],a:0,exp:"<b>121.645:</b> destination → +10% of total time → most distant alternate → 30 min holding at 1,500 ft.",ref:"121.645"},
{cat:"FARs",q:"121.647 fuel-computation factors include:",o:["Wind and weather, anticipated traffic delays, one instrument approach and possible missed approach, other delaying conditions","Passenger load only","Fuel price and tankering policy"],a:0,exp:"All four factors — <b>wind/wx, traffic delays, one approach + possible missed, anything else that delays landing</b>.",ref:"121.647"},
{cat:"FARs",q:"121.465: a dispatcher's scheduled duty may not exceed:",o:["10 consecutive hours","12 consecutive hours","8 consecutive hours"],a:0,exp:"<b>10 hours.</b> Beyond 10 in any 24 → must get 8 hours rest at/before the end of 10 hours of duty.",ref:"121.465"},
{cat:"FARs",q:"121.465 weekly relief: each dispatcher must be relieved of all duty at least:",o:["24 consecutive hours during any 7 consecutive days (or monthly equivalent)","48 hours per week","8 hours per week"],a:0,exp:"<b>24-in-7</b> (or the equivalent within a calendar month). The 'max hours a dispatcher can work' question comes from this section.",ref:"121.465"},
{cat:"FARs",q:"121.617: a takeoff alternate is required when:",o:["Departure weather is below the LANDING minimums in the OpSpecs for that airport","Departure weather is below takeoff minimums","Any time it's IFR"],a:0,exp:"You can legally take off but couldn't return — so you name a takeoff alternate <b>on the release</b>.",ref:"121.617"},
{cat:"FARs",q:"121.617 distance limit for a 2-engine airplane:",o:["1 hour at normal cruise speed, still air, ONE ENGINE INOPERATIVE","2 hours all engines","330 NM flat"],a:0,exp:"<b>Twins: 1 hour</b>, 3+ engines: 2 hours — normal cruise, still air, one engine out. That's 'how the distance is determined' from Test 2.",ref:"121.617"},
{cat:"FARs",q:"The 1-2-3 rule (121.619): no destination alternate needed if, 1 hr before to 1 hr after ETA:",o:["Ceiling ≥ 2,000 ft AND vis ≥ 3 SM","Ceiling ≥ 1,000 / vis ≥ 2","Sky clear and vis ≥ 6"],a:0,exp:"<b>1 hour / 2,000 ft / 3 SM.</b> Fail either → alternate goes on the release.",ref:"121.619"},
{cat:"FARs",q:"A SECOND alternate is required when:",o:["Destination and first alternate are both marginal (and in Exemption 3585 cases)","Any international flight","Flight time exceeds 6 hours"],a:0,exp:"<b>Marginal destination + marginal alternate → second alternate</b>, with fuel to the most distant. Test 2 asked when you'd need one.",ref:"121.619/Ex.3585"},
{cat:"FARs",q:"121.627: a dispatcher may NOT allow a flight to continue toward its dispatched airport when:",o:["It appears the flight cannot be completed safely (unless amended per 121.631)","Any TAF shows TEMPO","The captain requests higher altitude"],a:0,exp:"Continuing toward an unsafe destination is prohibited — the tool is an <b>amended release</b> (new destination/alternate).",ref:"121.627"},
{cat:"FARs",q:"Four classic reasons to AMEND a dispatch release:",o:["Weather below minimums; MEL/mechanical change; insufficient fuel; change of destination/alternate/route","Passenger count, catering, gate, crew meal","Any turbulence report"],a:0,exp:"The 'name 4 things that amend a release' question — <b>weather, mechanical, fuel, routing</b> (121.631).",ref:"121.631"},
{cat:"FARs",q:"The 6 items on a dispatch release (121.687):",o:["Aircraft ID, trip number, airports (dep/intermediate/dest/alternates), type of operation, minimum fuel, ETOPS diversion time","Crew names, pax count, cargo, fuel price, gate, squawk","Route, altitude, speed, weather, NOTAMs, times"],a:0,exp:"Memorize all six — the test asks you to LIST them. Weather reports/forecasts must be attached or referenced.",ref:"121.687"},
{cat:"FARs",q:"121.593 (domestic): no person may start a flight unless:",o:["ATC issues a clearance","An aircraft dispatcher specifically authorizes that flight","Maintenance signs the logbook"],a:1,exp:"<b>Dispatch authority</b> — a flight doesn't move without a dispatcher's authorization. That's the profession in one sentence.",ref:"121.593"},
{cat:"FARs",q:"After a dispatcher exercises emergency authority with a deviation, the written report goes:",o:["Through the operations manager to the FAA Administrator within 10 days","To the NTSB within 48 hours","To the chief pilot within 7 days"],a:0,exp:"<b>121.557/121.559:</b> report through the operations manager to the Administrator <b>within 10 days</b>.",ref:"121.557"},
{cat:"FARs",q:"Dispatch release, load manifest, and flight plan copies must be kept at least:",o:["30 days","3 months","1 year"],a:1,exp:"<b>121.693/121.697: 3 months.</b> An easy point if you've seen it once.",ref:"121.693"},
{cat:"FARs",q:"14 CFR Part 117 covers:",o:["Flightcrew (pilot) flight/duty limits and rest","Dispatcher certification","Airport certification"],a:0,exp:"<b>117 = pilots.</b> Dispatchers live under 121.463–.465. The test pairs these to see if you know whose rules are whose.",ref:"Part 117"},
{cat:"FARs",q:"14 CFR Part 39 covers:",o:["Airworthiness Directives","Advisory Circulars","NOTAMs"],a:0,exp:"<b>Part 39 = ADs</b> — legally enforceable fixes for unsafe conditions in aircraft, engines, propellers, appliances.",ref:"Part 39"},
{cat:"FARs",q:"AC vs AD:",o:["AC mandatory, AD advisory","AC = advisory/non-regulatory guidance; AD = mandatory/legally enforceable","Both mandatory"],a:1,exp:"<b>AC = guidance (non-regulatory). AD = law (Part 39).</b> The 6/24/22 test literally noted 'AC — non-regulatory, AD — mandatory.'",ref:"Ref 06 §11"},
{cat:"FARs",q:"14 CFR Part 91 is:",o:["General operating and flight rules for all operators","Air-carrier certification","Dispatcher training"],a:0,exp:"<b>Part 91 = the baseline rules for everyone;</b> Part 121 stacks air-carrier requirements on top.",ref:"Part 91"},
{cat:"FARs",q:"A NOTAM is:",o:["Time-critical aeronautical information not yet published on charts","A company memo","A weather advisory"],a:0,exp:"<b>Notice to Air Missions</b> — closures, NAVAID outages, FICONs, TFRs, obstacles. Dispatchers read them on every release.",ref:"Ref 06 §11"},
{cat:"FARs",q:"The definition of night (14 CFR 1.1):",o:["Sunset to sunrise","End of evening civil twilight to beginning of morning civil twilight","30 min after sunset to 30 min before sunrise"],a:1,exp:"<b>Civil twilight to civil twilight</b> (Air Almanac). Asked on multiple AA tests — don't confuse with the logging/currency rules.",ref:"14 CFR 1.1"},
{cat:"FARs",q:"Operational control means exercising authority over:",o:["Initiating, conducting, and terminating a flight","The cabin crew","Ramp operations"],a:0,exp:"<b>Initiate, conduct, terminate</b> — and in domestic ops the PIC and dispatcher share joint responsibility for it.",ref:"121.533"},
{cat:"FARs",q:"The certificate holder may delegate ______ but never ______ for operational control:",o:["Authority / responsibility","Responsibility / authority","Neither"],a:0,exp:"<b>Authority can be delegated; responsibility cannot</b> (121.533(b)). Pairs with the 121.663 sign-vs-dispatch rule.",ref:"121.533"},
{cat:"FARs",q:"Transponder codes 7500 / 7600 / 7700:",o:["Hijack / lost communications / emergency","Emergency / hijack / lost comms","Lost comms / emergency / hijack"],a:0,exp:"<b>75 taken alive · 76 radio fix · 77 going to heaven.</b> All three were on Test 1.",ref:"AIM 6-2/6-4"},
{cat:"FARs",q:"NORDO means:",o:["No radar contact","An aircraft unable to (or not) communicating by radio","No destination alternate"],a:1,exp:"<b>NO RaDiO</b> — squawk 7600; ATC applies lost-comm rules. Definition question straight from the test.",ref:"AIM 6-4-1"},
{cat:"FARs",q:"'Pan-Pan, Pan-Pan, Pan-Pan' signals:",o:["Distress with immediate danger","Urgency — a safety concern without immediate danger","A radio check"],a:1,exp:"<b>Pan-Pan = urgency; MAYDAY = distress.</b> Test 2 asked it cold.",ref:"AIM 6-3-1"},
{cat:"FARs",q:"A 'suitable airport' for dispatch has:",o:["Adequate runways, services, and weather at/above minimums for the aircraft type","Any paved runway over 5,000 ft","A control tower"],a:0,exp:"Suitability = <b>performance + facilities + weather</b>, per the carrier's OpSpecs/ops manual. 'Define suitable airport' is an interview staple.",ref:"Ref 06 §11"},
{cat:"FARs",q:"Driftdown Method 1 requires the engine-out net flight path to clear terrain within 5 SM of track by:",o:["1,000 ft","2,000 ft","500 ft"],a:0,exp:"<b>Method 1: 1,000 ft everywhere</b> along the route. Can't meet it? Use Method 2.",ref:"121.191"},
{cat:"FARs",q:"Driftdown Method 2 clears terrain by ______ while drifting down to a ______:",o:["2,000 ft / designated driftdown ALTERNATE airport","1,000 ft / destination","3,000 ft / departure airport"],a:0,exp:"<b>Method 2: 2,000 ft during driftdown to a driftdown alternate</b>, positive slope 1,500 ft above it. 'Explain Method 1 & 2' was on the 6/24/22 test.",ref:"121.191"},
// Fractions
{cat:"Fractions",q:"5/8 + 5/8 =",o:["1 1/4","1 1/8","10/16"],a:0,exp:"10/8 = <b>1 2/8 = 1 1/4</b>. Same denominator: add numerators, then simplify.",ref:"Ref 06 §14"},
{cat:"Fractions",q:"1/2 + 2/8 =",o:["3/4","5/8","7/8"],a:0,exp:"1/2 = 4/8 → 4/8 + 2/8 = 6/8 = <b>3/4</b>.",ref:"Ref 06 §14"},
{cat:"Fractions",q:"2/3 + 3/5 + 6/9 =",o:["1 14/15","1 4/5","2 1/15"],a:0,exp:"6/9 = 2/3. So 2/3+2/3 = 4/3 = 20/15; +3/5 = 9/15 → 29/15 = <b>1 14/15</b>. This exact one was on the 6/24/22 test.",ref:"Ref 06 §14"},
{cat:"Fractions",q:"3/4 − 1/3 =",o:["5/12","1/2","7/12"],a:0,exp:"LCD 12: 9/12 − 4/12 = <b>5/12</b>.",ref:"Ref 06 §14"},
{cat:"Fractions",q:"7/16 + 5/8 =",o:["1 1/16","15/16","1 3/16"],a:0,exp:"5/8 = 10/16 → 17/16 = <b>1 1/16</b>.",ref:"Ref 06 §14"},
{cat:"Fractions",q:"1 1/2 + 2 2/3 =",o:["4 1/6","3 5/6","4 1/3"],a:0,exp:"3/2 + 8/3 = 9/6 + 16/6 = 25/6 = <b>4 1/6</b>.",ref:"Ref 06 §14"},
// Performance (examiner favorite)
{cat:"Performance",q:"Dispatching a turboJET: at destination it must make a full-stop landing within:",o:["60% of the effective runway length","70% of the effective runway length","80% of the effective runway length"],a:0,exp:"<b>121.195(b): turbojet = 60%.</b> Turboprop = 70%. 'Effective length' starts where the glidepath crosses the threshold.",ref:"121.195"},
{cat:"Performance",q:"A turboPROP must land within what portion of the effective runway length?",o:["60%","70%","No factor applies"],a:1,exp:"<b>70% for turboprops</b> (121.185/121.195). The 60/70 pair is a classic test discriminator.",ref:"121.195"},
{cat:"Performance",q:"Destination runways forecast WET at ETA. Required landing runway length vs dry:",o:["Unchanged if grooved","115% of the dry requirement","The 60% factor becomes 50%"],a:1,exp:"<b>121.195(d): wet/slippery forecast → 115%</b> of the dry required length (unless approved shorter wet data in OpSpecs).",ref:"121.195(d)"},
{cat:"Performance",q:"Selecting a LOWER flap setting for takeoff trades:",o:["Shorter ground roll for worse climb","A longer ground run for a BETTER climb gradient","Nothing — flap setting only affects landing"],a:1,exp:"Less flap = less drag = <b>better climb</b>, but less lift = <b>more runway</b>. More flap is the reverse. Classic climb-limit vs field-limit trade.",ref:"Perf basics"},
{cat:"Performance",q:"Higher density altitude (hot day, high field elevation) causes:",o:["Longer takeoff roll AND reduced climb performance","Shorter roll due to less drag","No change if using reduced thrust"],a:0,exp:"Thin air = less engine thrust, less lift, less prop/fan bite → <b>everything gets worse</b>. Hot + high + heavy = the performance killer combo.",ref:"PHAK"},
{cat:"Performance",q:"In takeoff/landing performance data, wind credit is limited to:",o:["50% of the reported headwind; 150% of the reported tailwind must be applied","100% of headwind and tailwind alike","No wind may be considered"],a:0,exp:"Conservatism is built in: only <b>half the headwind helps you; one-and-a-half times the tailwind hurts you</b> (14 CFR 25.105).",ref:"25.105"},
{cat:"Performance",q:"V1 is:",o:["The engine-failure DECISION speed — last point to begin a reject and stop in the accelerate-stop distance","The speed for rotation","The minimum climb speed"],a:0,exp:"<b>V1 = go/no-go decision speed.</b> Failure recognized at/before V1 → stop; after V1 → you're committed to fly.",ref:"25.107"},
{cat:"Performance",q:"VR is:",o:["Touchdown speed","The speed at which rotation is initiated","Max tire speed"],a:1,exp:"<b>VR = rotation speed</b> — timed so the airplane reaches V2 by 35 ft with an engine out. Order: V1 ≤ VR < V2.",ref:"25.107"},
{cat:"Performance",q:"V2 is:",o:["The takeoff safety speed ensuring the required engine-out climb gradient at 35 ft","Best rate of climb speed","Flap retraction speed"],a:0,exp:"<b>V2 = engine-out takeoff safety speed</b>, flown through the second segment.",ref:"25.107"},
{cat:"Performance",q:"VREF for landing is approximately:",o:["1.3 × stall speed in landing configuration","1.1 × V2","The same as V1"],a:0,exp:"<b>VREF ≈ 1.3 VS0</b> — the 50-ft threshold-crossing speed the landing data is built on. Additives for gusts per company policy.",ref:"25.125"},
{cat:"Performance",q:"VMCG is:",o:["Minimum control speed on the GROUND with the critical engine failed, using rudder only","Max gear speed","Minimum climb gradient speed"],a:0,exp:"<b>VMCG</b> = slowest speed you can keep it straight on the runway after engine failure with aerodynamic controls alone. V1 may never be below VMCG.",ref:"25.149"},
{cat:"Performance",q:"A BALANCED FIELD LENGTH means:",o:["Accelerate-stop distance equals accelerate-go distance","The runway has equal stopway at both ends","Takeoff and landing distances are equal"],a:0,exp:"At the balanced V1, <b>stop distance = go distance</b> — the shortest runway that covers both outcomes.",ref:"Perf basics"},
{cat:"Performance",q:"Required second-segment climb gradient for a 2-engine airplane (gear up, V2, one engine out):",o:["2.4%","1.2%","5.0%"],a:0,exp:"<b>2.4% gross for twins</b> (2.7% for 3 engines, 3.0% for 4). Second segment = 35 ft to level-off, the usual climb-limiting segment.",ref:"25.121"},
{cat:"Performance",q:"The takeoff 'screen height' the data guarantees crossing (dry runway) is:",o:["35 ft","50 ft","100 ft"],a:0,exp:"<b>35 ft at V2</b> with an engine failed at the worst point (15 ft allowed on wet runways with credit).",ref:"25.113"},
{cat:"Performance",q:"Max allowable takeoff weight is the LOWEST of:",o:["Structural, climb-limit, field-length, obstacle, tire/brake-energy, and landing-weight-plus-burn limits","Structural and fuel capacity only","Whatever the load planner requests"],a:0,exp:"Run every limit, then take the <b>lowest</b>. The test gives you a table and expects you to spot the controlling one.",ref:"121.189/.195"},
{cat:"Performance",q:"Anti-skid inoperative (MEL) most directly penalizes:",o:["Accelerate-stop / field length and landing distance","Climb-limit weight","Zero fuel weight"],a:0,exp:"No anti-skid = far longer stopping → <b>V1/field-length and landing-distance</b> hits, sometimes huge on short/wet runways.",ref:"MEL/AFM"},
{cat:"Performance",q:"Brake energy limits (VMBE) matter most for:",o:["Heavy weights, high field elevation, hot temps, tailwinds","Light weights on long runways","Cold-weather ops only"],a:0,exp:"A reject near V1 at high groundspeed can exceed what the brakes can absorb — <b>hot/high/heavy/tailwind</b> pushes V1 toward VMBE.",ref:"AFM"},
{cat:"Performance",q:"On a contaminated (slush/standing water) runway, V1 is typically:",o:["Reduced — stopping is the critical case","Increased — get airborne sooner","Unchanged"],a:0,exp:"Poor stopping → the data <b>reduces V1</b> (and weight) so a reject still fits. Contamination also adds impingement drag on the go case.",ref:"AFM/OpSpecs"},
{cat:"Performance",q:"'Driftdown' is:",o:["The gradual descent from cruise to the one-engine-inoperative ceiling after an engine failure","A rapid emergency descent","Descent into the traffic pattern"],a:0,exp:"Engine out at cruise → can't hold altitude → <b>drift down at best speed to the EO ceiling</b>. 121.191 requires terrain clearance along the way (Methods 1 & 2).",ref:"121.191"},
{cat:"Performance",q:"Dynamic hydroplaning speed (kt) is roughly:",o:["9 × √(tire pressure in psi)","Half the touchdown speed","1.3 × VS0"],a:0,exp:"<b>≈9√P</b>: a 121-psi tire hydroplanes near 99 kt. Above it, tires ride the water film — braking ≈ nil.",ref:"AC 25-32"},
{cat:"Performance",q:"A landing-distance assessment at time of arrival uses:",o:["The reported RwyCC / braking action and actual weight, wind, runway","Only the dispatch numbers from release time","The captain's estimate"],a:0,exp:"Conditions change en route — the arrival assessment re-runs landing distance with <b>current RwyCC, weight and wind</b> (+15% safety margin per SAFO 19001 practice).",ref:"SAFO 19001"},
{cat:"Performance",q:"A tailwind on LANDING:",o:["Increases landing distance; most transports are limited to 10–15 kt","Decreases float","Has no effect below 20 kt"],a:0,exp:"Higher groundspeed at touchdown = <b>more distance</b> (and remember: data applies 150% of it). Same 10–15 kt limit as takeoff.",ref:"AFM"},
{cat:"Performance",q:"Landing with MORE flap (within limits) gives:",o:["Lower VREF and shorter landing distance, but worse go-around climb","Higher VREF and shorter distance","No performance difference"],a:0,exp:"Full flap = slower approach = <b>shorter stop</b> — at the cost of go-around gradient. The landing mirror of the takeoff flap trade.",ref:"Perf basics"},
{cat:"Performance",q:"Cold temperatures and high pressure (low density altitude) make performance:",o:["Better — denser air improves thrust and lift","Worse — cold air is harder to compress","Unchanged"],a:0,exp:"Dense air = more molecules through the engine and over the wing = <b>better everything</b>. That's why hot afternoons cap payloads.",ref:"PHAK"},
{cat:"Performance",q:"An overweight landing (above MLW):",o:["Is permitted when an emergency requires it, followed by an overweight-landing inspection","Is never permitted","Requires FAA pre-approval by phone"],a:0,exp:"Emergencies happen — land overweight if needed, then maintenance performs the <b>overweight landing inspection</b> before the next flight.",ref:"AMM/ops manual"},
// Weights additions
{cat:"Weights",q:"Maximum ramp (taxi) weight is:",o:["Slightly above MTOW — the difference is taxi fuel burned before takeoff","Equal to MTOW","MZFW plus payload"],a:0,exp:"<b>Ramp = TOW + taxi fuel.</b> You may push back above MTOW as long as you burn down to it by brake release.",ref:"Ref 06 §1"},
{cat:"Weights",q:"The load manifest (121.665) must include:",o:["Aircraft/fuel/cargo/pax weights, max allowable TOW for the conditions, and CG within limits","Only the passenger count","Fuel weight and gate number"],a:0,exp:"<b>Weights + the max allowable for THIS runway/conditions + CG limits.</b> Kept 3 months (121.693).",ref:"121.665"},
{cat:"Weights",q:"Which weight changes continuously during flight?",o:["ZFW","Gross weight (fuel burn)","OEW"],a:1,exp:"ZFW and OEW are fixed once loaded — <b>gross weight falls as fuel burns</b>, which is why TOW is checked against MLW + burn.",ref:"Ref 06 §1"},
{cat:"Weights",q:"Forward CG (vs aft) gives:",o:["More stability, higher stall speed, more trim drag/fuel burn","Less stability and lower stall speed","Better cruise efficiency"],a:0,exp:"Nose-heavy = the tail pushes down harder = <b>stable but draggy</b>, higher stall speed. Aft CG is efficient but less stable.",ref:"PHAK Ch.10"},
// Weather additions
{cat:"Weather",q:"A SPECI is issued when:",o:["A significant change occurs (e.g., ceiling drops below 1,000 ft, vis below 3SM, TS begins)","Every 30 minutes in IMC","The TAF is amended"],a:0,exp:"<b>SPECI = unscheduled special METAR</b> triggered by threshold-crossing changes. Its criteria track the alternate/IFR decision points.",ref:"AC 00-45H"},
{cat:"Weather",q:"In a TAF, PROB30 means:",o:["A 30% probability of the conditions in that group","Conditions expected for 30 minutes","Winds at 30 kt possible"],a:0,exp:"<b>30% chance</b> — below 50%, so it's possible-not-expected. Company policy dictates how PROB30 below minimums is handled (often like conditional language).",ref:"AC 00-45H"},
{cat:"Weather",q:"TEMPO vs BECMG vs FM in a TAF:",o:["TEMPO = temporary fluctuations (<1 hr at a time); BECMG = gradual change over the period; FM = rapid, complete change at that time","All three mean the same thing","FM = fluctuating conditions"],a:0,exp:"<b>FM flips the whole forecast at once; BECMG transitions across the window; TEMPO bounces back and forth.</b> The alternate decision often hinges on which one carries the bad weather.",ref:"AC 00-45H"},
{cat:"Weather",q:"Winds-aloft (FB) group 731960 at FL390 decodes as:",o:["230° / 119 kt / −60°C","730° — invalid","130° / 19 kt / +60°C"],a:0,exp:"First pair >50 → subtract 50 (73−50=23 → 230°), add 100 to speed (19+100=119). Above FL240 temps are <b>always negative</b>.",ref:"AC 00-45H"},
{cat:"Weather",q:"SLP132 in METAR remarks means:",o:["Sea level pressure 1013.2 hPa","Slip indicator 132","Snow pellets, 1.32 inches"],a:0,exp:"<b>SLP = sea level pressure</b>: prepend 9 or 10 (whichever lands nearest 1000): 132 → <b>1013.2 hPa</b>. The SW test asked SLP directly.",ref:"AC 00-45H"},
{cat:"Weather",q:"Clear ice vs rime ice:",o:["Clear: large supercooled drops spreading before freezing — heavy, hard to see; rime: small drops freezing instantly — milky, brittle","Rime is heavier than clear","Clear ice only forms in snow"],a:0,exp:"<b>Clear = large droplets, freezing rain zones, worst accretion.</b> Rime = instant-freeze opaque buildup on leading edges. Mixed = both.",ref:"AC 00-6B"},
{cat:"Weather",q:"The most dangerous low-level wind shear phenomenon near thunderstorms is:",o:["The microburst — an intense downdraft spreading outward at the surface","The sea breeze front","Mechanical turbulence"],a:0,exp:"<b>Microburst:</b> performance-gaining headwind → sudden tailwind/downdraft. Can exceed climb capability — that's why LLWS alerts and PIREPs matter to dispatch.",ref:"AC 00-54"},
{cat:"Weather",q:"Jet streams are strongest in:",o:["Winter — when the temperature gradient between air masses is greatest","Summer","They don't vary seasonally"],a:0,exp:"Bigger pole-to-equator temperature contrast = <b>stronger winter jets</b> (150 kt+ cores) — shifting routes, fuel, and turbulence planning.",ref:"AC 00-6B"},
// FARs additions
{cat:"FARs",q:"Dispatcher operating familiarization (121.463) requires:",o:["5 hours observing flight-deck operations within the preceding 12 months","One checkride per year","10 takeoffs and landings"],a:0,exp:"<b>5 hours in 12 months</b> on the flight deck (or approved forward observer station) for each group/type dispatched.",ref:"121.463"},
{cat:"FARs",q:"121.601: before AND during flight, the dispatcher must give the PIC:",o:["All available current reports on airport conditions and NAVAID irregularities that may affect safety","Only the initial weather package","Fuel prices at the alternates"],a:0,exp:"Includes en route updates: <b>adverse weather and meteorological changes</b> — the 'keep the crew informed' duty.",ref:"121.601"},
{cat:"FARs",q:"Exemption 3585 lets AA dispatch when:",o:["Conditional TAF language is below minimums, IF the main body is at/above minimums, a second alternate is listed, and fuel covers the most distant alternate","The captain waives the weather requirements","Any TEMPO exists"],a:0,exp:"<b>Main body OK + conditional slightly low → add second alternate + fuel.</b> A famous AA-specific dispatch tool; know its shape.",ref:"Ex. 3585"},
{cat:"FARs",q:"Inoperative equipment at dispatch is handled under:",o:["The approved Minimum Equipment List (MEL) per 121.628","The captain's judgment alone","Part 39"],a:0,exp:"<b>121.628 + the approved MEL:</b> item deferrable, placard, (M)/(O) procedures, performance penalties applied — or it doesn't go.",ref:"121.628"},
{cat:"FARs",q:"NTSB Part 830 requires IMMEDIATE notification for:",o:["Flight control system failure, crew incapacitation, in-flight fire, turbine failure with debris escape","Any diversion","Bird strikes with no damage"],a:0,exp:"The immediate-notify list (830.5) also includes ≥$25k property damage and overdue aircraft. Accident REPORTS: within 10 days.",ref:"NTSB 830"},
{cat:"FARs",q:"Sterile cockpit (121.542) prohibits non-essential activities:",o:["During taxi, takeoff, landing, and flight below 10,000 ft (except cruise)","Only below 5,000 ft","During the entire flight"],a:0,exp:"<b>Critical phases = ground ops + everything below 10,000 ft except cruise.</b> Dispatch ACARS chatter counts — time non-urgent messages accordingly.",ref:"121.542"},
{cat:"FARs",q:"Domestic flight delayed on the ground at an intermediate stop. Redispatch is required when departure will be more than:",o:["1 hour behind the original release","2 hours","6 hours"],a:0,exp:"<b>121.631: more than 1 hour</b> → amended/redispatch release. A favorite 'buried problem' in scenario questions.",ref:"121.631"},
{cat:"FARs",q:"RVR 1600 is prescribed but not reported. The substitute ground visibility is:",o:["1/4 SM","1/2 SM","3/4 SM"],a:0,exp:"<b>RVR 16 ≈ 1/4 SM.</b> Ladder: 24=1/2, 32=5/8, 40=3/4, 50=1, 60=1¼ SM. Conversions show up in dispatch-legality questions.",ref:"91.175"},
// Approaches additions
{cat:"Approaches",q:"LPV approaches are:",o:["Approaches with vertical guidance (APV) — vertical guidance but not officially 'precision'","CAT II precision approaches","Non-precision, lateral only"],a:0,exp:"<b>LPV & LNAV/VNAV = APV</b> — they use a DA and feel like an ILS, but the official 'precision' club is ILS/PAR/GLS.",ref:"AIM 5-4-5"},
{cat:"Approaches",q:"Aircraft approach categories (A, B, C, D) are based on:",o:["1.3 × VS0 at max certificated landing weight (VREF speed)","Wingspan","Max takeoff weight"],a:0,exp:"<b>Speed-based:</b> A <91, B 91–120, C 121–140, D 141–165 kt. Don't confuse with ILS CAT I/II/III — the test loves this trap.",ref:"14 CFR 97.3"},
{cat:"Approaches",q:"Circling minimums are:",o:["Higher than straight-in minimums, with MDA and increased visibility","Lower than straight-in","The same as CAT I"],a:0,exp:"Circling = visual maneuvering at MDA in a protected radius — <b>always higher mins</b>; many carriers restrict or ban circling at night.",ref:"AIM 5-4-20"},
{cat:"Approaches",q:"A HUD/autoland requirement typically appears for:",o:["CAT II/III lower-than-standard minimums","Any ILS","VFR arrivals"],a:0,exp:"Going below CAT I requires <b>equipment (autoland/HUD) + crew quals + OpSpec authorization</b> — the 'two things' answer in equipment form.",ref:"OpSpec C059/C060"},
// Nav & PBN additions
{cat:"Nav & PBN",q:"RNAV 1 means the aircraft stays within:",o:["1 NM of course 95% of the time","1° of course","1,000 ft of altitude"],a:0,exp:"The number after RNAV/RNP is the <b>95% lateral containment in NM</b>. RNP adds the monitoring/alerting on top.",ref:"AC 90-105"},
{cat:"Nav & PBN",q:"CPDLC is:",o:["Controller–Pilot Data Link Communications — text-based ATC clearances","A GPS augmentation system","The cockpit voice recorder"],a:0,exp:"<b>Datalink ATC</b> — routine clearances by text, standard in oceanic airspace and growing domestically (DCL departure clearances).",ref:"AIM 4-5-8"},
{cat:"Nav & PBN",q:"True course 090°, variation 10°W. Magnetic course:",o:["100°","080°","090°"],a:0,exp:"<b>West is best (add):</b> 090 + 10 = 100° magnetic. East is least (subtract). Practice both directions.",ref:"Ref 06 §6"},
// Runways additions
{cat:"Runways",q:"A FICON NOTAM reports:",o:["Field conditions — RwyCC codes and contaminant type/depth per runway third","Fuel inventory","Frequency changes"],a:0,exp:"<b>FIeld CONdition NOTAM</b> — where the RwyCC (e.g., 5/5/3, 1/4 in wet snow) lives. Dispatch reads these for landing performance.",ref:"Ref 06 §3"},
{cat:"Runways",q:"A blast pad differs from a stopway in that a blast pad:",o:["Carries NO performance credit — it only resists jet-blast erosion","May be used for accelerate-go","Is always 1,000 ft long"],a:0,exp:"Blast pad = paint and pavement protection, <b>zero credit</b>. Stopway = engineered for reject deceleration (stop credit only).",ref:"AC 150/5300"},
{cat:"Runways",q:"An UPHILL runway slope on takeoff:",o:["Increases takeoff distance","Decreases takeoff distance","Only affects landing"],a:0,exp:"Fighting gravity on the roll = <b>longer takeoff distance</b> (and downhill helps takeoff but hurts stopping). Slope is in the performance data.",ref:"Perf basics"},
// Maps & Codes additions
{cat:"Maps & Codes",q:"ZME / ZKC / ZMP are:",o:["Memphis / Kansas City / Minneapolis Centers","Miami / Kansas City / Memphis","Memphis / Chicago / Milwaukee"],a:0,exp:"<b>Memphis, Kansas City, Minneapolis</b> — the central-column centers on the US map exercise.",ref:"Ref 06 §7"},
{cat:"Maps & Codes",q:"CDG / FRA / DUB are:",o:["Paris de Gaulle / Frankfurt / Dublin","Copenhagen / Frankfurt / Dubai","Paris / Freiburg / Durban"],a:0,exp:"<b>Paris-CDG, Frankfurt, Dublin</b> — all AA Europe destinations; the Europe map is on the test.",ref:"Ref 06 §8"},
{cat:"Maps & Codes",q:"BNA / MSY / MCI are:",o:["Nashville / New Orleans / Kansas City","Birmingham / Memphis / Cincinnati","Nashville / Missoula / Macon"],a:0,exp:"<b>Nashville, New Orleans, Kansas City</b> — regional codes that don't match their city names are the ones the test picks.",ref:"Ref 06 §8"},
// Fractions additions
{cat:"Fractions",q:"3/8 + 1/4 =",o:["5/8","1/2","7/8"],a:0,exp:"1/4 = 2/8 → 3/8 + 2/8 = <b>5/8</b>.",ref:"Ref 06 §14"},
{cat:"Fractions",q:"2/5 + 1/2 =",o:["9/10","7/10","4/7"],a:0,exp:"LCD 10: 4/10 + 5/10 = <b>9/10</b>.",ref:"Ref 06 §14"},
{cat:"Fractions",q:"1 3/4 − 7/8 =",o:["7/8","3/4","1 1/8"],a:0,exp:"7/4 = 14/8 → 14/8 − 7/8 = <b>7/8</b>.",ref:"Ref 06 §14"},
{cat:"Fractions",q:"5/6 + 2/3 =",o:["1 1/2","1 1/3","1 1/6"],a:0,exp:"2/3 = 4/6 → 9/6 = <b>1 3/6 = 1 1/2</b>.",ref:"Ref 06 §14"},
// Landing & takeoff weight limitations (121.185/.189/.195/.197)
{cat:"FARs",q:"Which section governs turbine-powered LANDING limitations at the DESTINATION airport?",o:["121.189","121.195","121.197"],a:1,exp:"<b>121.195</b> — the landing-weight rule. Memory chain: 185 props-landing · 189 turbine-takeoff · <b>195 turbine-landing-destination</b> · 197 landing-alternate.",ref:"121.195"},
{cat:"FARs",q:"121.197 covers landing limitations at:",o:["Alternate airports","Departure airports","Military fields"],a:0,exp:"<b>121.197 = the same landing checks run at every listed ALTERNATE</b>, using that airport's runways.",ref:"121.197"},
{cat:"FARs",q:"121.195(a): no takeoff at a weight that, after normal fuel burn, exceeds ________ at arrival:",o:["Maximum structural landing weight","Maximum zero fuel weight","Climb-limit weight"],a:0,exp:"Fill-in-the-blank favorite: after <b>normal consumption of fuel and oil</b>, arrival weight may not exceed <b>max structural landing weight</b>. Hence landing-limited TOW = MLW + burn.",ref:"121.195(a)"},
{cat:"Performance",q:"MLW 144,000 lb · trip burn 11,500 · structural MTOW 174,200 · climb limit 171,000 · runway limit 168,300. Max release weight:",o:["155,500 — landing-limited (MLW + burn)","168,300","171,000"],a:0,exp:"144,000 + 11,500 = <b>155,500</b> — lower than every other limit, so the LANDING limitation controls the takeoff weight (121.195).",ref:"121.195"},
{cat:"Performance",q:"Under 121.195, the weight you may dispatch at is:",o:["The MOST RESTRICTIVE (lowest) of all applicable limits","The average of the criteria","Structural MTOW with captain concurrence"],a:0,exp:"Structural MLW+burn, the 60% runway check, the 115% wet factor — run them all, <b>lowest wins</b>. Same logic as the takeoff-weight chain.",ref:"121.195"},
{cat:"Performance",q:"The turboprop landing runway factor (121.185) is:",o:["70% of effective runway length","60%","85%"],a:0,exp:"<b>Turboprop 70% / turbojet 60%</b> — the classic pair. 'Effective length' starts where the glidepath crosses the threshold.",ref:"121.185/.195"},
{cat:"Performance",q:"121.189 (turbine takeoff) requires the NET takeoff flight path to clear obstacles by:",o:["35 ft","50 ft","100 ft"],a:0,exp:"<b>35 ft net</b> within the prescribed lateral limits — the obstacle leg of the takeoff-limit chain (with accel-stop and takeoff-distance checks).",ref:"121.189"},
{cat:"Performance",q:"Dispatching a turbojet to a short-runway destination (e.g., KDCA), the limit that most often controls the TAKEOFF weight is:",o:["The landing limitation — MLW + burn and the 60%/115% runway checks at destination","Tire speed","MZFW"],a:0,exp:"Short destination runways make <b>121.195 the silent controller of takeoff weight</b> — the classic buried problem at DCA/LGA/SNA.",ref:"121.195"},
// AA FOM Section 5g (Takeoff/General) — company policy
{cat:"AA FOM",q:"Per the AA FOM, who decides whether the takeoff runway is affected by snow, slush, ice, or standing water?",o:["The dispatcher","The captain","The tower controller"],a:1,exp:"<b>The captain decides</b> — from weather reports, FICONs, PIREPs, or visual inspection — contacting dispatch for additional info if desired (FOM 5g.1.1).",ref:"FOM 5g.1.1"},
{cat:"AA FOM",q:"Any portion of the takeoff runway is slippery or covered by slush. The takeoff must:",o:["Start from the point providing the MAXIMUM available runway length","Use an intersection if performance allows","Be delayed until the runway is plowed"],a:0,exp:"Company policy: contaminated runway → <b>full length, no intersection takeoffs</b> (FOM 5g.1.1).",ref:"FOM 5g.1.1"},
{cat:"AA FOM",q:"ATIS may include the runway condition code but will NOT include:",o:["The active runway","A description (type and depth) of the contaminant","The RVR"],a:1,exp:"ATIS gives the <b>RwyCC only</b>; the contaminant type/depth lives in the FICON NOTAM (per runway third: touchdown/midpoint/rollout).",ref:"FOM 5g.1.2"},
{cat:"AA FOM",q:"A FICON NOTAM is issued whenever the runway surface is:",o:["Other than dry","Below RwyCC 3","Officially closed"],a:0,exp:"Anything <b>other than dry</b> triggers a FICON, listing the code and contaminant per runway third. Max TWO different contaminants reported per third.",ref:"FOM 5g.1.2"},
{cat:"AA FOM",q:"A runway is considered CONTAMINATED when more than ____ of the required field length is covered:",o:["25%","50%","10%"],a:0,exp:"<b>>25%</b> coverage by standing water/slush/wet snow >1/8 in, dry snow >1 in, compacted snow, or ice (FOM 5g.1.4). Wet = 1/8 in or less.",ref:"FOM 5g.1.4"},
{cat:"AA FOM",q:"A 'slippery when wet' NOTAM corresponds to a runway condition code of:",o:["3 (medium)","5 (good)","1 (poor)"],a:0,exp:"Slippery-when-wet friction characteristics → the RCAM shows <b>RwyCC 3</b> when wet (FOM 5g.1.4).",ref:"FOM 5g.1.4"},
{cat:"AA FOM",q:"Standard runway width for all AA aircraft types is:",o:["148 ft (45 m)","100 ft (30 m)","200 ft (60 m)"],a:0,exp:"<b>148 ft / 45 m.</b> Narrower runways need Managing Director Flight Ops approval AND crosswind component ≤ 20 kt (FOM 5g.1.3).",ref:"FOM 5g.1.3"},
{cat:"AA FOM",q:"EMAS at the end of a runway:",o:["Crushes under the aircraft to stop an overrun — and does NOT affect normal performance","Reduces allowable takeoff weight","Counts as stopway in the accelerate-stop data"],a:0,exp:"<b>Engineered Materials Arresting System</b> — a crushable overrun bed (think LGA). Normal takeoff/landing data ignores it; if you stop in it, don't move the aircraft.",ref:"FOM 5g.2.1"},
{cat:"AA FOM",q:"Standard US takeoff minimums for a two-engine aircraft are:",o:["RVR 5000 or 1 mile","RVR 1600 or 1/4 mile","RVR 1000"],a:0,exp:"<b>RVR 5000 / 1 SM</b> (OpSpec C056). Everything lower is 'lower than standard' under C078 with report + lighting requirements from the Takeoff Legality table.",ref:"FOM 5g.4.3"},
{cat:"AA FOM",q:"At TDZ/MID/RO RVR 500 (150m), the required lighting is:",o:["CL and HIRL","REL only","RCLM only"],a:0,exp:"RVR 500 needs <b>centerline lights AND high-intensity runway lights</b>, any 2 reports all controlling (Table 5g.1).",ref:"FOM 5g.4.1"},
{cat:"AA FOM",q:"The lowest takeoff minimum authorized — specially equipped (HUD) aircraft only, where charted — is:",o:["RVR 300 (75 m)","RVR 500","RVR 600"],a:0,exp:"<b>RVR 300 with a HUD</b>, and only when the airport's charted takeoff minimums list 300 RVR. Without that equipment/charting, the floor is RVR 500 (CL + HIRL).",ref:"FOM 5g.4.1"},
{cat:"AA FOM",q:"A far end (FE) transmissometer reading is:",o:["Always advisory only — it can never substitute for a required report","Controlling at night","Required for RVR 500 operations"],a:0,exp:"<b>FE is always advisory</b> (e.g., DEN). If no TDZ report exists, MID may substitute — but FE never counts.",ref:"FOM 5g.4.1"},
{cat:"AA FOM",q:"The CAPTAIN must personally conduct the takeoff when visibility is less than:",o:["RVR 1600 / 1/4 SM","RVR 5000 / 1 SM","Any time it's night"],a:0,exp:"Below <b>1600 RVR (or 1/4 SM with no RVR)</b> the captain flies the ground roll through clean-up (FOM 5g.4.2).",ref:"FOM 5g.4.2"},
{cat:"AA FOM",q:"There is no TDZ RVR report for your departure runway. The pilots may:",o:["NOT visually assess whether the runway meets takeoff visibility minimums","Estimate the visibility themselves","Use the far-end reading instead"],a:0,exp:"No TDZ RVR → <b>no visual self-assessment authorized</b> (FOM 5g.4.2). Use reported visibility rules instead.",ref:"FOM 5g.4.2"},
{cat:"AA FOM",q:"'Line up and wait' on the runway without direct ATC communication is limited to:",o:["90 seconds","3 minutes","30 seconds"],a:0,exp:"<b>90 seconds</b> — beyond that, get clearance or taxi clear. And never shut down engines on an active runway (FOM 5g.3.1).",ref:"FOM 5g.3.1"},
{cat:"AA FOM",q:"Minimum altitude for a turn after takeoff:",o:["400 ft AFL (exceptions never below 100 ft)","1,000 ft AFL always","At the captain's discretion"],a:0,exp:"<b>400 ft AFL</b>; a turn may begin lower (never <100 ft) only for ATC, a specific engine-failure procedure, or missed approach (FOM 5g.3.2).",ref:"FOM 5g.3.2"},
{cat:"AA FOM",q:"Cleared 'fly runway heading' departing runway 04 (centerline 044°). You fly:",o:["044° with NO drift correction","040° corrected for wind","The extended centerline ground track"],a:0,exp:"Runway heading = <b>the heading, no drift correction</b> — everyone on that departure drifts together (FOM 5g.3.3).",ref:"FOM 5g.3.3"},
{cat:"AA FOM",q:"For visibility reports, 1 statute mile equals:",o:["1600 meters","1000 meters","5280 meters"],a:0,exp:"<b>1 SM = 1600 m</b> for vis reports (so 1/4 SM = 400 m). The C051 conversion tables run the ladder both ways.",ref:"FOM 5g.4/C051"},
{cat:"AA FOM",q:"A Part 121 carrier's Flight Operations Manual (FOM) is required by:",o:["14 CFR 121.133 (manual required), with contents per 121.135","Part 91 only","An FAA Advisory Circular"],a:0,exp:"<b>121.133 requires the manual system; 121.135 dictates its contents.</b> The FOM turns FARs, OpSpecs, and industry standards into ONE company rulebook the FAA accepts.",ref:"121.133/.135"},
{cat:"AA FOM",q:"An air carrier's takeoff minimums come from:",o:["Its Operations Specifications — C056 (standard) and C078 (lower than standard)","The AIM","Each captain's judgment"],a:0,exp:"<b>OpSpecs are the source</b> (issued under 119.49; authority chain runs through 91.175(f)). The FOM's takeoff-legality table implements C056/C078.",ref:"OpSpecs C056/C078"},
{cat:"AA FOM",q:"The FICON/RwyCC definitions and NOTAM format come from:",o:["AC 150/5200-28 (Field Condition Reporting)","14 CFR 121.629","The Jeppesen legend"],a:0,exp:"<b>AC 150/5200-28</b> standardizes contamination definitions and FICON NOTAMs — airports report them under their Part 139 duties.",ref:"AC 150/5200-28"},
{cat:"AA FOM",q:"Standard runway width criteria trace to:",o:["AC 150/5300-13 (Airport Design)","14 CFR 121.189","OpSpec C055"],a:0,exp:"<b>AC 150/5300-13</b> is the FAA airport DESIGN standard the FOM cites for the 148 ft/45 m width — an advisory circular, not a FAR.",ref:"AC 150/5300-13"},
{cat:"AA FOM",q:"Jeppesen airport pages show lower-than-standard takeoff minimums that differ from the company's takeoff-legality table. Which controls?",o:["The company FOM table — it is the controlling document","The Jeppesen page","Whichever is lower"],a:0,exp:"The FOM's Takeoff Legality table is <b>controlling</b>; Jepp pages may be used but never below the table's requirements. Company rules can be MORE restrictive than published, never less.",ref:"FOM 5g.4.5"},
// Operational control, release weather/amendments, briefing duties (generalized)
{cat:"FARs",q:"The FULL definition of operational control: the exercise of authority over the ________ of a flight, in the interest of safety and the regularity and efficiency of the flight:",o:["Initiation, continuation, diversion, or termination","Planning, fueling, and boarding","Takeoff and landing only"],a:0,exp:"<b>Four verbs: initiate, continue, DIVERT, terminate</b> — in the interest of safety AND regularity/efficiency (121.533/.535/.537). The short 1.1 gloss drops 'diversion'; know both phrasings.",ref:"121.533-.537"},
{cat:"FARs",q:"Operational control for domestic / flag / supplemental operations is governed respectively by:",o:["121.533 / 121.535 / 121.537","121.99 / 121.101 / 121.103","91.3 / 91.13 / 91.103"],a:0,exp:"<b>533-535-537, in that order.</b> Domestic & flag: PIC + dispatcher jointly responsible; supplemental shifts more to the PIC and director of operations.",ref:"121.533-.537"},
{cat:"FARs",q:"Which is NOT among the dispatcher's operational-control functions?",o:["Flight progress monitoring","Issuing safety-of-flight information (weather, NOTAMs, ATC constraints)","Assigning cabin crew rest periods"],a:2,exp:"The list: planning/release · progress monitoring · safety info · release amendments · PIC-dispatcher comms · emergency procedures · delay/cancel for unsafe conditions. <b>Crew scheduling isn't operational control.</b>",ref:"121.533/IOSA DSP"},
{cat:"FARs",q:"Weather attached to the dispatch release must be the latest available:",o:["At the time the release is SIGNED by the PIC and dispatcher","At scheduled departure time","One hour before ETA"],a:0,exp:"<b>121.687(b):</b> latest available at signing, covering destination, intermediate stops, and alternates — plus anything else the PIC or dispatcher considers necessary.",ref:"121.687(b)"},
{cat:"FARs",q:"A release amendment must include a statement such as CHANGE/AMEND/REVISE, a description of the change, and:",o:["The dispatcher's name or radio initials and the time of the change","The captain's certificate number","FAA field-office approval"],a:0,exp:"<b>Statement + who + when</b> (plus supporting details: weather, field conditions, NOTAMs, fuel, routing). Exception: ACARS auto-time-stamps, so no separate time entry needed.",ref:"121.631 practice"},
{cat:"FARs",q:"The dispatcher's preflight weather briefing to the PIC may be delivered:",o:["Verbally or in writing","In writing only","Only via ACARS"],a:0,exp:"Either works — issuing the flight plan/release IS the briefing vehicle. The point (121.601): dispatcher and captain hold <b>adequate and IDENTICAL information</b>.",ref:"121.601"},
{cat:"FARs",q:"The INTENT of 121.601 (dispatcher information to PIC) is that the dispatcher and captain have:",o:["Adequate and IDENTICAL information for planning","Independent, separate weather sources","Only the legally minimum data"],a:0,exp:"<b>'Adequate and identical'</b> — both consider everything: inop NAVAIDs, shortened runways, weather driving approach and alternate selection. En route, the dispatcher keeps feeding CAT/TS/LLWS and facility irregularities (121.601(c)).",ref:"121.601"},
{cat:"FARs",q:"Reviewing NOTAMs to confirm weather-reporting facilities are operative, which reporting component is required ONLY where published minimums demand it?",o:["Ceiling","Wind direction and speed","Date and time of observation"],a:0,exp:"<b>Ceiling is conditional</b>; altimeter is required unless the approach plate lists an alternate source. The rest — station ID, time, temp, wind, visibility — are always required.",ref:"121.599/8900.1"},
// Tropopause & jet cores
{cat:"Weather",q:"The tropopause is the boundary between:",o:["The troposphere (temp decreasing with height) and stratosphere (temp steady or slightly warming)","Two surface air masses","The jet stream and the ozone layer"],a:0,exp:"Thin boundary layer: below it temps FALL with height; above they hold or <b>warm slightly</b> — which caps convection (anvil tops flatten there).",ref:"Ref 09 §5"},
{cat:"Weather",q:"Tropopause height runs from about:",o:["65,000 ft over the Equator to 20,000 ft near the poles","36,000 ft everywhere","20,000 ft at the Equator to 65,000 ft at the poles"],a:0,exp:"<b>High and cold over the tropics, low near the poles</b> — and it descends in STEPS (breaks), not smoothly.",ref:"Ref 09 §5"},
{cat:"Weather",q:"The strongest jet-core winds are typically found:",o:["Near sharp BREAKS between the tropical and polar tropopause","At the center of surface highs","Uniformly along the Equator"],a:0,exp:"Jet cores live at <b>tropopause breaks</b> where temperature and wind gradients are sharpest — prime clear-air-turbulence territory.",ref:"Ref 09 §5"},
{cat:"Weather",q:"Your flight plan shows tropopause height changing sharply over a short distance with wind speed/direction changes. The route is likely:",o:["In or near a jet core — expect possible turbulence","In stable, quiet air","Crossing the ITCZ"],a:0,exp:"That combination is the <b>flight-plan signature of a jet core</b>; turbulence products (SIGMETs, graphical forecasts) key on exactly these gradients.",ref:"Ref 09 §5"},
// Weight buildup numeric drills
{cat:"Weights",q:"OEW 92,000 lb · payload 38,500 lb · total fuel 24,000 lb (taxi 800). ZFW is:",o:["130,500 lb","154,500 lb","116,000 lb"],a:0,exp:"<b>ZFW = OEW + payload = 92,000 + 38,500 = 130,500.</b> Fuel never enters ZFW — that's the whole point of the number.",ref:"Ref 06 §1"},
{cat:"Weights",q:"Same flight: ZFW 130,500 · total fuel 24,000 · taxi burn 800. Ramp weight and takeoff weight are:",o:["Ramp 154,500 / TOW 153,700","Ramp 153,700 / TOW 154,500","Ramp 154,500 / TOW 154,500"],a:0,exp:"<b>Ramp = ZFW + all fuel = 154,500; TOW = ramp − taxi burn = 153,700.</b> Max taxi (ramp) weight sits slightly above MTOW for exactly this reason.",ref:"Ref 06 §1"},
{cat:"Weights",q:"MZFW 138,000 · OEW 92,000 · booked payload 47,500 lb. You may load:",o:["Only 46,000 lb — payload is MZFW-limited (138,000 − 92,000)","All 47,500 lb if fuel is reduced","All 47,500 lb if the runway is long"],a:0,exp:"<b>Max payload = MZFW − OEW = 46,000.</b> Reducing FUEL doesn't help — fuel isn't in ZFW. You're leaving 1,500 lb of payload behind; that's the wing-root protection at work.",ref:"Ref 06 §1"},
// Dispatch landing data (ref 10) — how the landing tables work
{cat:"Performance",q:"The maximum landing weight for DISPATCH is the LIGHTER of:",o:["Climb-limited, runway-limited, and maximum structural landing weight","Ramp weight and MZFW","Whatever the load planner files"],a:0,exp:"<b>Three candidates, lowest wins</b> — go-around capability (climb), stopping distance (runway), and the AFM structural limit. This is 121.195 turned into table lookups.",ref:"Ref 10 §1"},
{cat:"Performance",q:"The CLIMB limited landing weight table is entered with:",o:["Airport pressure altitude and temperature","Usable landing length and wind","Runway slope and RwyCC"],a:0,exp:"<b>Altitude + OAT</b> — it's a go-around climb check, so thin air is what hurts. Field elevation may be used for pressure altitude.",ref:"Ref 10 §2"},
{cat:"Performance",q:"The RUNWAY limited landing weight table is entered with:",o:["Usable landing length and airport pressure altitude","OAT and wind only","V-speeds"],a:0,exp:"<b>Usable length + pressure altitude</b>, read from the DRY or WET column for the conditions.",ref:"Ref 10 §3"},
{cat:"Performance",q:"At dispatch, forecast visibility is 1/2 SM but the runway is DRY. Which landing data applies?",o:["WET — whenever forecast vis is below 3/4 SM (RVR 4000), use wet data at dispatch","DRY — the runway is dry","Contaminated"],a:0,exp:"<b>The 3/4-mile rule:</b> vis < 3/4 SM (RVR 4000) → runway condition WET for the dispatch calculation, dry or not. Applies at dispatch only, not to in-flight assessments.",ref:"Ref 10 §3"},
{cat:"Performance",q:"'N/A' or 'Not Auth'd' in a runway-limited landing weight table means:",o:["The runway is too short — landing not authorized at any weight","Data not yet published","Use the dry column instead"],a:0,exp:"<b>No legal weight exists</b> for that length/altitude combination — the runway is simply too short.",ref:"Ref 10 §3"},
{cat:"Performance",q:"In landing-weight wind corrections, the tailwind penalty per knot compared to the headwind credit is roughly:",o:["4–5 times larger","Equal","Half as large"],a:0,exp:"Example from a real table: <b>+0.5 per knot headwind vs −2.3 per knot tailwind</b> (per 1,000 lb). The 50%/150% conservatism from 25.105 shows up here as a brutal asymmetry.",ref:"Ref 10 §3"},
{cat:"Performance",q:"Usable landing length is measured beyond the ________, and you must NOT use the '________' column:",o:["Threshold / Landing Beyond Glide Slope","Glide slope / Landing Beyond Threshold","Aim point / TORA"],a:0,exp:"Use paved length or the <b>'Landing Beyond Threshold'</b> figure (or ball-note LDA). The <b>glide-slope column is a different, shorter number</b> — grabbing it is a classic table-reading error.",ref:"Ref 10 §4"},
{cat:"Performance",q:"MEL/CDL penalties for inoperative equipment are applied to:",o:["The climb-limited landing weight or the usable landing length","The structural limit","Fuel reserves only"],a:0,exp:"The penalty lives in the MEL/CDL item itself and hits <b>climb weight or usable length</b> — e.g., anti-skid inop slashes the usable-length credit.",ref:"Ref 10 §5"},
{cat:"Performance",q:"The ICE ACCRETION landing-weight correction must be applied when:",o:["Moderate/severe icing is expected ≥30 min within the hour before arrival AND arrival temperature is 10°C or colder","Any visible moisture exists","The departure airport is below freezing"],a:0,exp:"<b>30 minutes / within the final hour / ≤10°C at arrival</b> — and if anti-ice corrections also apply, they're CUMULATIVE (apply both).",ref:"Ref 10 §2"},
{cat:"AA FOM",q:"Landing weight exceeded the Maximum Quick Turn-Around Weight. Before the next takeoff:",o:["Wait at least 67 minutes ground time and check the wheel thermal plugs have not melted","Nothing — it only matters for maintenance logs","Deflate and reinflate the tires"],a:0,exp:"<b>67 minutes + thermal-plug check.</b> Hot brakes can melt the fuse plugs that protect against tire burst. If the wait delays departure — advise dispatch.",ref:"Ref 10 §6"},
{cat:"AA FOM",q:"The Maximum Quick Turn-Around Weight exists to protect against:",o:["Brake/tire overheating on a subsequent takeoff (melted thermal plugs)","Wing bending loads","Passenger connection times"],a:0,exp:"Land heavy → brakes soak heat → a quick turnaround could mean <b>rejecting a takeoff on already-hot brakes</b>. The wait lets thermal plugs prove they held.",ref:"Ref 10 §6"},
{cat:"AA FOM",q:"A corrected usable landing length reaches the dispatcher via:",o:["NOTAM, field condition (FICON) report, or temporary airport analysis (TAA)","Company email only","The ATIS remarks"],a:0,exp:"Construction, displaced thresholds, contamination — the corrections flow through <b>NOTAMs, FICONs, or a TAA</b>. Always check before trusting the published length.",ref:"Ref 10 §4"},
{cat:"Runways",q:"On a Jeppesen airport diagram, EMAS appears as:",o:["A marked crushable-bed area at the runway end (e.g., both JFK 4R/22L ends)","A dashed taxiway","It is never depicted"],a:0,exp:"The diagram shows <b>EMAS beds at the runway ends</b> — know it's there when evaluating overrun protection on short runways.",ref:"Ref 10 §7"},
{cat:"Runways",q:"'HS1' inside a circle on an airport diagram marks:",o:["A runway-incursion HOT SPOT — an intersection needing extra vigilance","A helicopter stand","A high-speed turnoff"],a:0,exp:"<b>Hot spots</b> flag historically confusing intersections (like JFK's Twy K/J complex). Dispatchers note them when briefing unfamiliar airports.",ref:"Ref 10 §7"},
{cat:"Runways",q:"In the Jeppesen 'FOR FILING AS ALTERNATE' box, some minimums are marked 'Authorized Only When Local Weather Available.' That means:",o:["You may only file that airport as an alternate using those minimums if it has weather reporting at the time","The minimums apply only to locals","ATC must approve the filing"],a:0,exp:"No usable weather source at the alternate → those rows are off the table. The box feeds directly into your <b>OpSpec C055 alternate math</b>.",ref:"Ref 10 §7"},
// 121.189 takeoff-limitations deep dive
{cat:"Performance",q:"121.189: the accelerate-stop distance at takeoff weight may not exceed:",o:["The runway length PLUS any stopway","The runway length plus clearway","1.15 × the runway length"],a:0,exp:"Reject at V1 → stop on <b>runway + STOPWAY</b>. Clearway never helps you stop — it's unpaved air-segment credit for the GO case only.",ref:"121.189"},
{cat:"Performance",q:"When clearway credit is used for the takeoff distance, which portion must still fit on the actual runway?",o:["The ground-roll/takeoff-run portion","The full distance to 35 ft","None — clearway substitutes for pavement"],a:0,exp:"Clearway may be credited only for part of the <b>airborne segment to 35 ft</b>; the takeoff RUN must remain within the pavement (25.113/121.189).",ref:"25.113"},
